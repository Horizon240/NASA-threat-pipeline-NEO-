name: Daily NASA Threat Pipeline

on:
  schedule:
    - cron: '0 8 * * *' # Runs every day at 8:00 AM UTC
  workflow_dispatch: 

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' 

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests psycopg2-binary gspread python-dotenv

      - name: Rebuild Google Credentials File
        run: |
          cat << 'EOF' > google_credentials.json
          ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          EOF

      - name: Run Pipeline Script
        env:
          DB_URI: ${{ secrets.DB_URI }}
        run: python nasa_pipeline.py
